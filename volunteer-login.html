<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Volunteer Login | VolunteerHub</title>

    <link rel="stylesheet" href="css/volunteer-login.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>

<body>

    <div class="container">

        <div class="left-panel">

            <h1>VolunteerHub</h1>

            <p>

                Welcome back, Volunteer!

                Sign in to join community events and make a positive impact.

            </p>

            <img src="https://images.unsplash.com/photo-1529156069898-49953e39b3ac?auto=format&fit=crop&w=900&q=80"
                alt="Volunteer">

        </div>

        <div class="right-panel">

            <h2>Volunteer Login</h2>

            <form>

                <div class="input-box">

                    <label>Email Address</label>

                    <input
                        type="email"
                        placeholder="Enter your email"
                        required>

                </div>

                <div class="input-box">

                    <label>Password</label>

                    <input
                        type="password"
                        placeholder="Enter your password"
                        required>

                </div>

                <div class="options">

                    <label>

                        <input type="checkbox">

                        Remember Me

                    </label>

                    <a href="#">Forgot Password?</a>

                </div>

                <a href="volunteer-dashboard.html">

    <button type="button">

        Login

    </button>

</a>

            </form>

            <p class="register">

                Don't have an account?

                <a href="login.html">

                    Register Here

                </a>

            </p>

        </div>

    </div>

</body>

</html>
